<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Học Python Tiếng Việt</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/skulpt/1.2.0/skulpt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/skulpt/1.2.0/skulpt-stdlib.js"></script>
<style>
:root {
  --bg: #0b0e14;
  --surface: #13181f;
  --surface2: #1a2030;
  --border: #252d3d;
  --accent: #00e5a0;
  --accent2: #4da6ff;
  --accent3: #ffb347;
  --purple: #b39ddb;
  --red: #ff6b6b;
  --text: #dde3f0;
  --muted: #6b7a99;
  --code-bg: #080b10;
  --nav-h: 56px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Be Vietnam Pro',sans-serif;
  display:flex;flex-direction:column;
}

/* ── NAV ── */
nav{
  height:var(--nav-h);flex-shrink:0;
  display:flex;align-items:center;gap:0;
  border-bottom:1px solid var(--border);
  background:rgba(11,14,20,0.97);
  position:relative;z-index:50;
}
.nav-logo{
  padding:0 16px;font-weight:800;font-size:15px;
  color:var(--accent);white-space:nowrap;
  border-right:1px solid var(--border);height:100%;
  display:flex;align-items:center;gap:8px;
}
.nav-tabs{display:flex;height:100%;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{
  padding:0 16px;height:100%;display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:600;color:var(--muted);
  border:none;background:transparent;cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;
  transition:all .18s;
}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── PAGES ── */
.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden;}
.page.active{display:flex;flex-direction:column;}

/* ══════════════════════════════
   TRANG 1 — LỘ TRÌNH
══════════════════════════════ */
#page-roadmap{padding:20px 16px 80px;}
.roadmap-header{
  background:linear-gradient(135deg,#0d2218 0%,#0d1a2e 100%);
  border:1px solid var(--border);border-radius:16px;
  padding:24px;margin-bottom:24px;position:relative;overflow:hidden;
}
.roadmap-header::before{
  content:'🐍';font-size:80px;position:absolute;right:-10px;top:-10px;
  opacity:.12;
}
.roadmap-header h2{font-size:20px;font-weight:800;color:var(--accent);margin-bottom:6px;}
.roadmap-header p{font-size:13px;color:var(--muted);line-height:1.6;}
.progress-bar-wrap{margin-top:16px;}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;}
.progress-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s;}

.phase-title{
  font-size:11px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
  margin:24px 0 10px;display:flex;align-items:center;gap:8px;
}
.phase-title::after{content:'';flex:1;height:1px;background:var(--border);}

.lesson-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;padding:14px;
  cursor:pointer;transition:all .18s;position:relative;
}
.lesson-card:hover{border-color:var(--accent2);transform:translateX(3px);}
.lesson-card.done{border-color:var(--accent);background:#0d1f17;}
.lesson-card.locked{opacity:.45;cursor:not-allowed;}
.lesson-card.active-lesson{border-color:var(--accent3);box-shadow:0 0 0 1px var(--accent3);}

.lesson-num{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
  background:var(--surface2);border:2px solid var(--border);color:var(--muted);
}
.lesson-card.done .lesson-num{background:#0d2218;border-color:var(--accent);color:var(--accent);}
.lesson-card.active-lesson .lesson-num{background:#1f1608;border-color:var(--accent3);color:var(--accent3);}

.lesson-info{flex:1;}
.lesson-name{font-size:14px;font-weight:700;color:var(--text);}
.lesson-card.done .lesson-name{color:var(--accent);}
.lesson-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.lesson-badge{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;
  background:var(--surface2);color:var(--muted);border:1px solid var(--border);
}
.lesson-card.done .lesson-badge{background:#0d2218;color:var(--accent);border-color:var(--accent);}

/* ══════════════════════════════
   TRANG 2 — BÀI HỌC
══════════════════════════════ */
#page-lesson{padding:0;}
.lesson-header{
  padding:16px;border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex;align-items:center;gap:12px;
}
.lesson-header h3{font-size:16px;font-weight:800;flex:1;}
.lesson-header .lesson-step{font-size:12px;color:var(--muted);}
.btn-nav{
  padding:7px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
}
.btn-nav:hover{border-color:var(--accent);color:var(--accent);}
.btn-nav.primary{background:var(--accent);color:#0b0e14;border-color:var(--accent);}
.btn-nav.primary:hover{opacity:.9;}

.lesson-body{padding:16px;overflow-y:auto;flex:1;}
.lesson-explain{
  font-size:14px;line-height:1.8;color:var(--text);margin-bottom:16px;
}
.lesson-explain strong{color:var(--accent3);}
.lesson-explain code{
  font-family:'JetBrains Mono',monospace;font-size:13px;
  background:var(--surface2);padding:2px 6px;border-radius:4px;color:var(--accent2);
}

.lesson-example{margin-bottom:16px;}
.example-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.code-block{
  background:var(--code-bg);border:1px solid var(--border);
  border-radius:10px;padding:14px;overflow-x:auto;
  font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;
}
.kw{color:#c792ea;} .fn{color:#82aaff;} .st{color:#c3e88d;}
.nm{color:#f78c6c;} .cm{color:#4a5568;font-style:italic;} .op{color:#ffb347;}

.task-box{
  background:#0d1a2e;border:1px solid var(--accent2);
  border-radius:10px;padding:14px;margin-bottom:14px;
}
.task-box .task-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent2);margin-bottom:6px;}
.task-box .task-desc{font-size:14px;line-height:1.6;}

/* ══════════════════════════════
   TRANG 3 — CHẠY CODE
══════════════════════════════ */
#page-code{display:flex;flex-direction:column;height:calc(100vh - var(--nav-h));}
.editor-toolbar{
  padding:10px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;background:var(--surface);
  flex-shrink:0;
}
.editor-toolbar span{font-size:12px;color:var(--muted);font-weight:600;}
.btn-run{
  margin-left:auto;padding:8px 20px;border-radius:8px;border:none;
  background:var(--accent);color:#0b0e14;
  font-family:'Be Vietnam Pro',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s;
}
.btn-run:hover{opacity:.85;}
.btn-clear{
  padding:8px 12px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:'Be Vietnam Pro',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.btn-clear:hover{border-color:var(--red);color:var(--red);}

#code-editor{
  flex:1;padding:14px;
  font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.7;
  background:var(--code-bg);color:var(--text);
  border:none;outline:none;resize:none;
  border-bottom:1px solid var(--border);
  min-height:200px;
}
.output-panel{flex-shrink:0;max-height:35vh;overflow-y:auto;}
.output-header{
  padding:8px 14px;background:var(--surface);
  border-bottom:1px solid var(--border);
  font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:8px;
}
.output-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.output-dot.running{background:var(--accent3);animation:pulse .6s infinite;}
.output-dot.ok{background:var(--accent);}
.output-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#output{
  padding:14px;font-family:'JetBrains Mono',monospace;font-size:13px;
  line-height:1.7;min-height:80px;background:var(--code-bg);
  white-space:pre-wrap;word-break:break-all;
}
.out-ok{color:var(--accent);}
.out-err{color:var(--red);}
.out-sys{color:var(--muted);}

/* ══════════════════════════════
   TRANG 4 — TRA CỨU
══════════════════════════════ */
#page-ref{padding:0;flex-direction:column;}
.ref-search-wrap{
  padding:12px;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
.ref-search-inner{position:relative;}
.ref-search-inner input{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:8px;padding:10px 14px 10px 38px;
  color:var(--text);font-family:'Be Vietnam Pro',sans-serif;font-size:14px;outline:none;
  transition:border-color .2s;
}
.ref-search-inner input:focus{border-color:var(--accent);}
.ref-search-inner .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);}
.ref-list{flex:1;overflow-y:auto;padding:12px 12px 60px;}

.ref-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;margin-bottom:8px;overflow:hidden;cursor:pointer;
  transition:border-color .18s;
}
.ref-card:hover{border-color:var(--accent2);}
.ref-card.open{border-color:var(--accent);}
.ref-card-h{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.ref-card-h .ico{font-size:16px;width:28px;text-align:center;flex-shrink:0;}
.ref-card-h .info{flex:1;}
.ref-card-h .name{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent2);}
.ref-card-h .desc{font-size:12px;color:var(--muted);margin-top:1px;}
.ref-card-h .chev{color:var(--muted);font-size:11px;transition:transform .2s;}
.ref-card.open .chev{transform:rotate(90deg);}
.ref-body{display:none;border-top:1px solid var(--border);padding:14px;}
.ref-card.open .ref-body{display:block;}
.ref-note{font-size:13px;color:var(--muted);line-height:1.6;border-left:3px solid var(--accent);padding-left:10px;margin-top:10px;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

/* INPUT POPUP */
.input-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:999;align-items:center;justify-content:center;padding:20px;
}
.input-overlay.show{display:flex;}
.input-box{
  background:var(--surface);border:1px solid var(--accent);
  border-radius:14px;padding:20px;width:100%;max-width:360px;
}
.input-box label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;}
.input-box input{
  width:100%;background:var(--code-bg);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;
}
.input-box input:focus{border-color:var(--accent);}
.input-box .btn-ok{
  margin-top:12px;width:100%;padding:10px;border-radius:8px;border:none;
  background:var(--accent);color:#0b0e14;font-weight:700;
  font-family:'Be Vietnam Pro',sans-serif;font-size:14px;cursor:pointer;
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">🐍 PyVN</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('roadmap',this)">📍 Lộ trình</button>
    <button class="nav-tab" onclick="showPage('lesson',this)">📖 Bài học</button>
    <button class="nav-tab" onclick="showPage('code',this)">▶ Chạy code</button>
    <button class="nav-tab" onclick="showPage('ref',this)">📚 Tra cứu</button>
  </div>
</nav>

<!-- PAGE: ROADMAP -->
<div class="page active" id="page-roadmap">
  <div id="roadmap-content"></div>
</div>

<!-- PAGE: LESSON -->
<div class="page" id="page-lesson" style="flex-direction:column;">
  <div class="lesson-header">
    <button class="btn-nav" onclick="prevLesson()">← Trước</button>
    <div style="flex:1;text-align:center;">
      <div class="lesson-step" id="lesson-step">Bài 1 / 20</div>
      <div id="lesson-title" style="font-size:15px;font-weight:800;margin-top:2px;"></div>
    </div>
    <button class="btn-nav primary" onclick="nextLesson()">Tiếp →</button>
  </div>
  <div class="lesson-body" id="lesson-body"></div>
</div>

<!-- PAGE: CODE -->
<div class="page" id="page-code" style="height:calc(100vh - 56px);">
  <div class="editor-toolbar">
    <span>✏️ Editor Python</span>
    <button class="btn-clear" onclick="clearEditor()">🗑 Xóa</button>
    <button class="btn-run" onclick="runCode()">▶ Chạy</button>
  </div>
  <textarea id="code-editor" spellcheck="false" placeholder="# Viết code Python ở đây...
print('Xin chào Việt Nam!')"></textarea>
  <div class="output-panel">
    <div class="output-header">
      <div class="output-dot" id="out-dot"></div>
      <span id="out-label">Kết quả</span>
    </div>
    <div id="output"><span class="out-sys">Nhấn ▶ Chạy để xem kết quả...</span></div>
  </div>
</div>

<!-- PAGE: REF -->
<div class="page" id="page-ref">
  <div class="ref-search-wrap">
    <div class="ref-search-inner">
      <span class="si">🔍</span>
      <input type="text" id="ref-search" placeholder="Tìm: print, for, list, ==..." oninput="renderRef()">
    </div>
  </div>
  <div class="ref-list" id="ref-list"></div>
</div>

<!-- INPUT POPUP -->
<div class="input-overlay" id="input-overlay">
  <div class="input-box">
    <label id="input-prompt">Nhập giá trị:</label>
    <input type="text" id="input-val" onkeydown="if(event.key==='Enter')inputOk()">
    <button class="btn-ok" onclick="inputOk()">OK</button>
  </div>
</div>

<script>
// ══════════════════════════════
// DATA — BÀI HỌC
// ══════════════════════════════
const LESSONS = [
  // PHASE 1
  {phase:"🌱 Giai đoạn 1 — Nhập môn",phaseIdx:0,
   name:"Giới thiệu Python",time:"5 phút",diff:"Dễ",
   explain:`<strong>Python</strong> là ngôn ngữ lập trình phổ biến nhất thế giới hiện nay.
   Nó được dùng để làm <strong>web, AI, khoa học dữ liệu, tự động hóa</strong> và rất nhiều thứ khác.
   <br><br>Điểm mạnh của Python là cú pháp <strong>đơn giản, dễ đọc</strong> — gần với tiếng Anh thông thường.
   <br><br>Lệnh đầu tiên bạn cần biết là <code>print()</code> — dùng để in thứ gì đó ra màn hình.`,
   example:`<span class="fn">print</span>(<span class="st">"Xin chào Python!"</span>)
<span class="fn">print</span>(<span class="st">"Tôi đang học lập trình"</span>)
<span class="fn">print</span>(<span class="nm">2024</span>)`,
   task:"Hãy vào tab ▶ Chạy code và thử gõ: print(\"Xin chào! Tên tôi là [tên bạn]\")",
   starter:`print("Xin chào Python!")
print("Tôi đang học lập trình")`},

  {phase:null,phaseIdx:0,
   name:"Biến và kiểu dữ liệu",time:"10 phút",diff:"Dễ",
   explain:`<strong>Biến</strong> là nơi lưu trữ dữ liệu. Python có 4 kiểu cơ bản:<br><br>
   • <code>str</code> — chuỗi văn bản: <code>"Xin chào"</code><br>
   • <code>int</code> — số nguyên: <code>42</code><br>
   • <code>float</code> — số thực: <code>3.14</code><br>
   • <code>bool</code> — đúng/sai: <code>True</code> hoặc <code>False</code><br><br>
   Đặt tên biến: viết thường, dùng dấu gạch dưới nếu nhiều từ. VD: <code>ten_hoc_sinh</code>`,
   example:`ten = <span class="st">"Minh"</span>
tuoi = <span class="nm">18</span>
diem = <span class="nm">9.5</span>
la_hoc_sinh = <span class="kw">True</span>

<span class="fn">print</span>(ten, tuoi, diem)
<span class="fn">print</span>(<span class="fn">type</span>(ten))   <span class="cm"># &lt;class 'str'&gt;</span>`,
   task:"Tạo 3 biến: tên bạn, tuổi bạn, môn học yêu thích. Rồi print() chúng ra.",
   starter:`ten = "Minh"
tuoi = 18
mon_hoc = "Toán"
print(ten, tuoi, mon_hoc)`},

  {phase:null,phaseIdx:0,
   name:"Nhập dữ liệu — input()",time:"10 phút",diff:"Dễ",
   explain:`Lệnh <code>input()</code> dừng chương trình lại và <strong>chờ người dùng nhập</strong> dữ liệu.
   <br><br>⚠️ <strong>Quan trọng:</strong> input() luôn trả về <strong>string</strong>. Muốn dùng số phải chuyển đổi:
   <br>• <code>int(input(...))</code> → số nguyên<br>• <code>float(input(...))</code> → số thực`,
   example:`ten = <span class="fn">input</span>(<span class="st">"Bạn tên gì? "</span>)
tuoi = <span class="fn">int</span>(<span class="fn">input</span>(<span class="st">"Bạn bao nhiêu tuổi? "</span>))

<span class="fn">print</span>(<span class="st">f"Xin chào </span>{ten}<span class="st">! Bạn </span>{tuoi}<span class="st"> tuổi."</span>)`,
   task:"Viết chương trình hỏi tên và tuổi, rồi in ra lời chào cá nhân.",
   starter:`ten = input("Bạn tên gì? ")
tuoi = int(input("Bạn bao nhiêu tuổi? "))
print(f"Xin chào {ten}! Bạn {tuoi} tuổi.")`},

  {phase:null,phaseIdx:0,
   name:"Toán tử số học",time:"10 phút",diff:"Dễ",
   explain:`Python có đầy đủ các phép toán:<br><br>
   <code>+</code> cộng &nbsp; <code>-</code> trừ &nbsp; <code>*</code> nhân &nbsp; <code>/</code> chia thực<br>
   <code>//</code> chia lấy nguyên &nbsp; <code>%</code> chia lấy dư &nbsp; <code>**</code> lũy thừa<br><br>
   <strong>Mẹo hay:</strong> dùng <code>%</code> để kiểm tra số chẵn lẻ: nếu <code>n % 2 == 0</code> thì n là số chẵn.`,
   example:`a, b = <span class="nm">17</span>, <span class="nm">5</span>
<span class="fn">print</span>(a <span class="op">+</span> b)   <span class="cm"># 22</span>
<span class="fn">print</span>(a <span class="op">-</span> b)   <span class="cm"># 12</span>
<span class="fn">print</span>(a <span class="op">*</span> b)   <span class="cm"># 85</span>
<span class="fn">print</span>(a <span class="op">/</span> b)   <span class="cm"># 3.4</span>
<span class="fn">print</span>(a <span class="op">//</span> b)  <span class="cm"># 3</span>
<span class="fn">print</span>(a <span class="op">%</span> b)   <span class="cm"># 2</span>
<span class="fn">print</span>(a <span class="op">**</span> <span class="nm">2</span>)  <span class="cm"># 289</span>`,
   task:"Viết máy tính: nhập 2 số, in ra kết quả của tất cả 7 phép toán trên.",
   starter:`a = int(input("Nhập số a: "))
b = int(input("Nhập số b: "))
print("Tổng:", a + b)
print("Hiệu:", a - b)
print("Tích:", a * b)
print("Thương:", a / b)`},

  // PHASE 2

// ══════════════════════════════
// STATE
// ══════════════════════════════
let currentLesson = 0;
const DONE_KEY = 'pylearn_done';
let doneLessons = JSON.parse(localStorage.getItem(DONE_KEY) || '[]');

function saveDone(){localStorage.setItem(DONE_KEY, JSON.stringify(doneLessons));}

// ══════════════════════════════
// NAVIGATION
// ══════════════════════════════
function showPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='roadmap') renderRoadmap();
  if(name==='lesson') renderLesson();
  if(name==='ref') renderRef();
}

// ══════════════════════════════
// ROADMAP
// ══════════════════════════════
function renderRoadmap(){
  const done = doneLessons.length;
  const total = LESSONS.length;
  const pct = Math.round(done/total*100);
  let html = `
  <div class="roadmap-header">
    <h2>Lộ trình học Python 🐍</h2>
    <p>${total} bài học · từ cơ bản đến nâng cao · có bài tập thực hành</p>
    <div class="progress-bar-wrap">
      <div class="progress-label"><span>Tiến độ</span><span>${done}/${total} bài (${pct}%)</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  </div>`;

  LESSONS.forEach((l,i)=>{
    if(l.phase) html += `<div class="phase-title">${l.phase}</div>`;
    const isDone = doneLessons.includes(i);
    const isActive = i===currentLesson;
    let cls = isDone?'done':(isActive?'active-lesson':'');
    html += `
    <div class="lesson-card ${cls}" onclick="goLesson(${i})">
      <div class="lesson-num">${isDone?'✓':i+1}</div>
      <div class="lesson-info">
        <div class="lesson-name">${l.name}</div>
        <div class="lesson-meta">⏱ ${l.time}</div>
      </div>
      <span class="lesson-badge">${l.diff}</span>
    </div>`;
  });
  document.getElementById('roadmap-content').innerHTML = html;
}

function goLesson(i){
  currentLesson = i;
  showPage('lesson', document.querySelectorAll('.nav-tab')[1]);
}

// ══════════════════════════════
// LESSON
// ══════════════════════════════
function renderLesson(){
  const l = LESSONS[currentLesson];
  document.getElementById('lesson-step').textContent = `Bài ${currentLesson+1} / ${LESSONS.length}`;
  document.getElementById('lesson-title').textContent = l.name;
  document.getElementById('lesson-body').innerHTML = `
    <div class="lesson-explain">${l.explain}</div>
    <div class="lesson-example">
      <div class="example-label">Ví dụ</div>
      <div class="code-block">${l.example}</div>
    </div>
    <div class="task-box">
      <div class="task-label">💪 Bài tập</div>
      <div class="task-desc">${l.task}</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-nav primary" onclick="tryCode(${currentLesson})">▶ Thử code ngay</button>
      <button class="btn-nav" style="background:var(--accent);color:#0b0e14;border-color:var(--accent);" onclick="markDone(${currentLesson})">✅ Đánh dấu hoàn thành</button>
    </div>
  `;
}

function tryCode(i){
  document.getElementById('code-editor').value = LESSONS[i].starter || '';
  showPage('code', document.querySelectorAll('.nav-tab')[2]);
}

function markDone(i){
  if(!doneLessons.includes(i)) doneLessons.push(i);
  saveDone();
  if(i < LESSONS.length-1){
    currentLesson = i+1;
    renderLesson();
  } else {
    document.getElementById('lesson-body').innerHTML += `<div style="text-align:center;padding:24px;color:var(--accent);font-size:18px;font-weight:800;">🎉 Bạn đã hoàn thành tất cả bài học!</div>`;
  }
}

function nextLesson(){
  if(currentLesson < LESSONS.length-1){ currentLesson++; renderLesson(); }
}
function prevLesson(){
  if(currentLesson > 0){ currentLesson--; renderLesson(); }
}

// ══════════════════════════════
// CODE RUNNER — Skulpt
// ══════════════════════════════
let inputResolve = null;

function setOutStatus(state){
  const dot = document.getElementById('out-dot');
  const lbl = document.getElementById('out-label');
  dot.className = 'output-dot ' + state;
  lbl.textContent = state==='running'?'Đang chạy...':(state==='ok'?'Thành công ✓':(state==='err'?'Có lỗi':'Kết quả'));
}

function runCode(){
  const code = document.getElementById('code-editor').value;
  const outEl = document.getElementById('output');
  outEl.innerHTML = '';
  setOutStatus('running');

  function outf(text){ outEl.innerHTML += `<span class="out-ok">${escHtml(text)}</span>`; }
  function builtinRead(x){
    if(Sk.builtinFiles===undefined||Sk.builtinFiles.files[x]===undefined) throw "File not found: "+x;
    return Sk.builtinFiles.files[x];
  }

  Sk.configure({
    output: outf,
    read: builtinRead,
    inputfun: (prompt) => new Promise(resolve => {
      inputResolve = resolve;
      document.getElementById('input-prompt').textContent = prompt || 'Nhập giá trị:';
      document.getElementById('input-val').value = '';
      document.getElementById('input-overlay').classList.add('show');
      setTimeout(()=>document.getElementById('input-val').focus(),100);
    }),
    inputfunTakesPrompt: true,
    __future__: Sk.python3,
  });

  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody('<stdin>',false,code,true))
    .then(()=>setOutStatus('ok'))
    .catch(e=>{
      outEl.innerHTML += `<span class="out-err">${escHtml(e.toString())}</span>`;
      setOutStatus('err');
    });
}

function inputOk(){
  const val = document.getElementById('input-val').value;
  document.getElementById('input-overlay').classList.remove('show');
  // Show what was entered
  document.getElementById('output').innerHTML += `<span class="out-sys">${escHtml(val)}\n</span>`;
  if(inputResolve){ inputResolve(val); inputResolve=null; }
}

function clearEditor(){
  document.getElementById('code-editor').value='';
  document.getElementById('output').innerHTML='<span class="out-sys">Nhấn ▶ Chạy để xem kết quả...</span>';
  setOutStatus('');
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Tab key in editor
document.getElementById('code-editor').addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const el=e.target, s=el.selectionStart, end=el.selectionEnd;
    el.value=el.value.substring(0,s)+'    '+el.value.substring(end);
    el.selectionStart=el.selectionEnd=s+4;
  }
});

// ══════════════════════════════
// REF
// ══════════════════════════════
function renderRef(){
  const q = (document.getElementById('ref-search')?.value||'').toLowerCase();
  const items = q ? REF_DATA.filter(d=>d.name.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q)) : REF_DATA;
  const container = document.getElementById('ref-list');
  if(!items.length){ container.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);">Không tìm thấy</div>'; return; }
  container.innerHTML = items.map((d,i)=>`
    <div class="ref-card" onclick="toggleRef(this)">
      <div class="ref-card-h">
        <div class="ico">${d.ico}</div>
        <div class="info">
          <div class="name">${d.name}</div>
          <div class="desc">${d.desc}</div>
        </div>
        <span class="chev">▶</span>
      </div>
      <div class="ref-body">
        <div class="example-label" style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Cú pháp</div>
        <div class="code-block">${d.syntax}</div>
        <div class="ref-note">💡 ${d.note}</div>
      </div>
    </div>`).join('');
}

function toggleRef(card){
  const was = card.classList.contains('open');
  document.querySelectorAll('.ref-card.open').forEach(c=>c.classList.remove('open'));
  if(!was) card.classList.add('open');
}

// ══════════════════════════════
// INIT
// ══════════════════════════════
renderRoadmap();
renderLesson();
renderRef();
</script>

</html>
