<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PyEditor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Be+Vietnam+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
<style>
/* ── RESET & BASE ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0e1525;
  --editor-bg:#0e1525;
  --gutter-bg:#0b1120;
  --surface:#1c2333;
  --surface2:#252f42;
  --surface3:#1a2236;
  --border:#2d3a52;
  --border2:#3d4f6e;
  --green:#00c774;
  --green-dim:#00552f;
  --blue:#4dabff;
  --blue-dim:#0d2d4d;
  --yellow:#f5a623;
  --red:#ff5c5c;
  --purple:#c792ea;
  --orange:#f78c6c;
  --cyan:#89ddff;
  --text:#cdd6f4;
  --muted:#6b7fa8;
  --dim:#3d4f6e;
  --line-h:22px;
  --font:'JetBrains Mono',monospace;
  --ui-font:'Be Vietnam Pro',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ui-font);overflow:hidden;}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100dvh;}

/* ── TOPBAR ── */
.topbar{
  flex-shrink:0;height:48px;
  background:#0b1120;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;
  position:relative;z-index:50;
}
.logo{font-size:15px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:6px;}
.logo span{color:var(--text);font-weight:500;font-size:13px;}
.file-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:4px 10px;font-size:12px;
  color:var(--text);font-family:var(--font);
}
.file-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);flex-shrink:0;}
.topbar-right{margin-left:auto;display:flex;gap:6px;align-items:center;}
.btn-run{
  height:32px;padding:0 16px;border-radius:6px;border:none;
  background:var(--green);color:#000;
  font-family:var(--ui-font);font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:opacity .15s,transform .1s;flex-shrink:0;
}
.btn-run:active{opacity:.8;transform:scale(.97);}
.btn-run.loading{background:var(--surface2);color:var(--muted);}
.btn-icon{
  height:32px;width:32px;border-radius:6px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.btn-icon:active{background:var(--surface2);}

/* ── SNIPPET BAR ── */
.snippet-bar{
  flex-shrink:0;height:36px;
  background:var(--gutter-bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:4px;
  padding:0 8px;overflow-x:auto;
}
.snippet-bar::-webkit-scrollbar{display:none;}
.snip{
  flex-shrink:0;height:24px;padding:0 10px;border-radius:4px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--muted);font-family:var(--font);font-size:11px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;transition:all .12s;
}
.snip:active{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}

/* ── EDITOR CONTAINER ── */
.editor-container{
  flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;
}

/* ── CODE PANEL ── */
.code-panel{
  flex:1;display:flex;overflow:hidden;position:relative;min-height:0;
}

/* Gutter (line numbers) */
.gutter{
  width:44px;flex-shrink:0;
  background:var(--gutter-bg);
  border-right:1px solid var(--border);
  overflow:hidden;position:relative;z-index:2;
}
.gutter-inner{
  padding:8px 0;position:absolute;top:0;left:0;right:0;
  font-family:var(--font);font-size:13px;line-height:var(--line-h);
  color:var(--dim);text-align:right;padding-right:10px;
  user-select:none;pointer-events:none;
}

/* Highlight layer sits behind textarea */
.editor-scroll{flex:1;overflow:auto;position:relative;-webkit-overflow-scrolling:touch;}
.editor-scroll::-webkit-scrollbar{width:6px;height:6px;}
.editor-scroll::-webkit-scrollbar-track{background:transparent;}
.editor-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.editor-inner{position:relative;min-height:100%;}

/* Current line highlight */
#line-highlight{
  position:absolute;left:0;right:0;height:var(--line-h);
  background:rgba(77,171,255,.06);pointer-events:none;z-index:0;
  transition:top .05s;
}

/* Syntax highlight overlay */
#hl-layer{
  position:absolute;top:0;left:0;right:0;
  padding:8px 12px;
  font-family:var(--font);font-size:13px;line-height:var(--line-h);
  white-space:pre;pointer-events:none;z-index:1;
  color:transparent;word-break:break-all;min-width:100%;
}

/* The actual textarea */
#code-ta{
  position:absolute;inset:0;
  padding:8px 12px;
  font-family:var(--font);font-size:13px;line-height:var(--line-h);
  background:transparent;color:var(--text);
  border:none;outline:none;resize:none;
  caret-color:var(--green);z-index:2;
  white-space:pre;overflow:hidden;
  -webkit-text-fill-color:transparent;
  -webkit-tap-highlight-color:transparent;
  width:100%;
}
/* Selection */
#code-ta::selection{background:rgba(77,171,255,.25);}

/* ── AUTOCOMPLETE ── */
#ac-popup{
  position:fixed;z-index:200;
  background:#1a2236;
  border:1px solid var(--border2);
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,.6);
  max-height:180px;overflow-y:auto;
  min-width:200px;max-width:280px;
  display:none;
}
#ac-popup::-webkit-scrollbar{width:3px;}
#ac-popup::-webkit-scrollbar-thumb{background:var(--border);}
.ac-item{
  padding:7px 10px;
  display:flex;align-items:center;gap:8px;
  cursor:pointer;transition:background .1s;
}
.ac-item:hover,.ac-item.sel{background:rgba(77,171,255,.12);}
.ac-kind{
  width:22px;height:16px;border-radius:3px;
  font-size:9px;font-weight:700;font-family:var(--ui-font);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.ac-kind.kw{background:#3a1f2a;color:#ff79c6;}
.ac-kind.fn{background:#1f2a3a;color:#82aaff;}
.ac-kind.bi{background:#1f3a2a;color:#c3e88d;}
.ac-label{font-family:var(--font);font-size:12px;color:var(--text);flex:1;}
.ac-desc{font-size:10px;color:var(--muted);font-family:var(--ui-font);flex-shrink:0;}

/* ── RESIZE HANDLE ── */
.resize-handle{
  flex-shrink:0;height:6px;
  background:var(--border);cursor:row-resize;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.resize-handle:active,.resize-handle:hover{background:var(--blue);}
.resize-handle::before{
  content:'';width:32px;height:2px;background:var(--dim);border-radius:99px;
}

/* ── OUTPUT PANEL ── */
.output-panel{
  flex-shrink:0;
  background:#080d16;
  display:flex;flex-direction:column;
  border-top:1px solid var(--border);
  min-height:48px;
}
.output-topbar{
  flex-shrink:0;height:34px;
  background:#0b1120;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;
}
.out-tab{
  font-size:12px;font-weight:600;color:var(--muted);
  padding:0 8px;height:100%;display:flex;align-items:center;
  border-bottom:2px solid transparent;cursor:pointer;
  font-family:var(--ui-font);
}
.out-tab.active{color:var(--green);border-bottom-color:var(--green);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.status-dot.ok{background:var(--green);}
.status-dot.err{background:var(--red);}
.status-dot.run{background:var(--yellow);animation:pulse .5s infinite alternate;}
@keyframes pulse{from{opacity:.4}to{opacity:1}}
.out-actions{margin-left:auto;display:flex;gap:4px;}
.out-act{
  height:22px;padding:0 8px;border-radius:4px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:10px;font-weight:600;
  font-family:var(--ui-font);cursor:pointer;transition:all .12s;
}
.out-act:active{border-color:var(--blue);color:var(--blue);}

#out-content{
  flex:1;overflow-y:auto;padding:10px 14px;
  font-family:var(--font);font-size:12.5px;line-height:1.7;
  white-space:pre-wrap;word-break:break-all;
  -webkit-overflow-scrolling:touch;
}
#out-content::-webkit-scrollbar{width:3px;}
#out-content::-webkit-scrollbar-thumb{background:var(--border);}
.out-sys{color:var(--muted);}
.out-ok{color:#cdd6f4;}
.out-err{color:var(--red);}
.out-inp{color:var(--yellow);}
.out-success{color:var(--green);}
.out-line{color:var(--muted);font-size:11px;}

/* ── SYNTAX COLORS ── */
.py-kw{color:#ff79c6;}
.py-fn{color:#82aaff;}
.py-bi{color:#82aaff;}
.py-st{color:#c3e88d;}
.py-nm{color:var(--orange);}
.py-cm{color:#545d7a;font-style:italic;}
.py-op{color:#89ddff;}
.py-dec{color:var(--green);}
.py-self{color:var(--orange);}
.py-cls{color:#ffcb6b;}
.py-bool{color:#ff79c6;}

/* ── INPUT MODAL (bottom sheet) ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;
  display:none;align-items:flex-end;
}
.modal-bg.show{display:flex;}
.modal-sheet{
  width:100%;background:var(--surface);
  border-radius:16px 16px 0 0;
  border:1px solid var(--border2);border-bottom:none;
  padding:20px 16px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom));
}
.modal-sheet .prompt-text{
  font-size:13px;color:var(--muted);margin-bottom:10px;
  font-family:var(--ui-font);
}
.modal-sheet input{
  width:100%;background:var(--gutter-bg);
  border:1.5px solid var(--border2);
  border-radius:8px;padding:12px 14px;
  color:var(--text);font-family:var(--font);font-size:15px;outline:none;
  transition:border-color .2s;
}
.modal-sheet input:focus{border-color:var(--blue);}
.modal-btns{margin-top:10px;display:flex;gap:8px;}
.modal-cancel{
  flex:0 0 auto;padding:11px 16px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:var(--ui-font);font-size:14px;cursor:pointer;
}
.modal-ok{
  flex:1;padding:11px;border-radius:8px;border:none;
  background:var(--green);color:#000;
  font-family:var(--ui-font);font-size:14px;font-weight:700;cursor:pointer;
}

/* ── LOADING OVERLAY ── */
.engine-loading{
  position:fixed;inset:0;background:var(--bg);z-index:400;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.spinner{
  width:36px;height:36px;border:3px solid var(--border2);
  border-top-color:var(--green);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.engine-loading p{font-size:13px;color:var(--muted);font-family:var(--ui-font);}
.engine-loading strong{color:var(--green);}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">🐍 <span>PyEditor VN</span></div>
  <div class="file-pill"><div class="dot"></div>main.py</div>
  <div class="topbar-right">
    <button class="btn-icon" title="Xóa" onclick="clearAll()">🗑</button>
    <button class="btn-icon" title="Copy" onclick="copyCode()">📋</button>
    <button class="btn-run" id="btn-run" onclick="runCode()">▶ Chạy</button>
  </div>
</div>

<!-- SNIPPET BAR -->
<div class="snippet-bar">
  <div class="snip" onclick="ins('print(\"\")')">print</div>
  <div class="snip" onclick="ins('input(\"\")')">input</div>
  <div class="snip" onclick="ins('if  :\n    ')">if</div>
  <div class="snip" onclick="ins('for i in range():\n    ')">for</div>
  <div class="snip" onclick="ins('while :\n    ')">while</div>
  <div class="snip" onclick="ins('def ():\n    return ')">def</div>
  <div class="snip" onclick="ins('class :\n    def __init__(self):\n        ')">class</div>
  <div class="snip" onclick="ins('try:\n    \nexcept Exception as e:\n    print(e)')">try</div>
  <div class="snip" onclick="ins('[] ')">list</div>
  <div class="snip" onclick="ins('{} ')">dict</div>
  <div class="snip" onclick="ins('f\"\"')">f-str</div>
  <div class="snip" onclick="ins('# ')">comment</div>
</div>

<!-- EDITOR AREA -->
<div class="editor-container">
  <div class="code-panel">
    <!-- Gutter -->
    <div class="gutter"><div class="gutter-inner" id="gutter-nums">1</div></div>
    <!-- Scroll area -->
    <div class="editor-scroll" id="editor-scroll">
      <div class="editor-inner" id="editor-inner">
        <div id="line-highlight"></div>
        <div id="hl-layer" aria-hidden="true"></div>
        <textarea id="code-ta" spellcheck="false"
          autocomplete="off" autocorrect="off" autocapitalize="off"
          placeholder="# Viết code Python ở đây..."></textarea>
      </div>
    </div>
  </div>

  <!-- Resize -->
  <div class="resize-handle" id="resize-handle"
    ontouchstart="startResize(event)" onmousedown="startResize(event)"></div>

  <!-- Output -->
  <div class="output-panel" id="output-panel" style="height:160px;">
    <div class="output-topbar">
      <div class="status-dot" id="status-dot"></div>
      <div class="out-tab active">Output</div>
      <div class="out-actions">
        <button class="out-act" onclick="clearOut()">Clear</button>
      </div>
    </div>
    <div id="out-content">
      <span class="out-sys">// Python engine đang khởi động...\n</span>
    </div>
  </div>
</div>

</div><!-- /app -->

<!-- AUTOCOMPLETE POPUP -->
<div id="ac-popup"></div>

<!-- INPUT MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal-sheet">
    <div class="prompt-text" id="modal-prompt">Nhập giá trị:</div>
    <input type="text" id="modal-input" autocomplete="off" autocorrect="off"
      onkeydown="if(event.key==='Enter')modalOk()">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="modalCancel()">Hủy</button>
      <button class="modal-ok" onclick="modalOk()">OK ↵</button>
    </div>
  </div>
</div>

<!-- LOADING -->
<div class="engine-loading" id="engine-loading">
  <div class="spinner"></div>
  <p>Đang tải <strong>Python Engine</strong>...</p>
  <p style="font-size:11px;">Cần internet lần đầu (~500KB)</p>
</div>

<script>
// ═══════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════
const PY_KW = ['False','None','True','and','as','assert','async','await',
  'break','class','continue','def','del','elif','else','except','finally',
  'for','from','global','if','import','in','is','lambda','nonlocal','not',
  'or','pass','raise','return','try','while','with','yield'];

const PY_BUILTINS = ['print','input','int','float','str','bool','list','dict',
  'tuple','set','len','range','type','isinstance','enumerate','zip','map',
  'filter','sorted','reversed','sum','min','max','abs','round','open','repr',
  'eval','exec','getattr','setattr','hasattr','callable','iter','next',
  'all','any','pow','divmod','chr','ord','hex','oct','bin','format','vars',
  'dir','id','hash','super','staticmethod','classmethod','property'];

const AC_ITEMS = [
  ...PY_KW.map(k=>({label:k,kind:'kw',desc:'keyword',insert:k+' '})),
  ...PY_BUILTINS.map(b=>({label:b,kind:'fn',desc:'built-in',insert:b+'()'})),
  {label:'append',kind:'bi',desc:'list',insert:'append()'},
  {label:'remove',kind:'bi',desc:'list',insert:'remove()'},
  {label:'pop',kind:'bi',desc:'list',insert:'pop()'},
  {label:'insert',kind:'bi',desc:'list',insert:'insert()'},
  {label:'extend',kind:'bi',desc:'list',insert:'extend()'},
  {label:'split',kind:'bi',desc:'str',insert:'split()'},
  {label:'join',kind:'bi',desc:'str',insert:'join()'},
  {label:'strip',kind:'bi',desc:'str',insert:'strip()'},
  {label:'replace',kind:'bi',desc:'str',insert:'replace()'},
  {label:'upper',kind:'bi',desc:'str',insert:'upper()'},
  {label:'lower',kind:'bi',desc:'str',insert:'lower()'},
  {label:'find',kind:'bi',desc:'str',insert:'find()'},
  {label:'startswith',kind:'bi',desc:'str',insert:'startswith()'},
  {label:'endswith',kind:'bi',desc:'str',insert:'endswith()'},
  {label:'items',kind:'bi',desc:'dict',insert:'items()'},
  {label:'keys',kind:'bi',desc:'dict',insert:'keys()'},
  {label:'values',kind:'bi',desc:'dict',insert:'values()'},
  {label:'get',kind:'bi',desc:'dict',insert:'get()'},
  {label:'update',kind:'bi',desc:'dict',insert:'update()'},
  {label:'self',kind:'bi',desc:'class',insert:'self'},
  {label:'__init__',kind:'bi',desc:'class',insert:'__init__'},
  {label:'__str__',kind:'bi',desc:'class',insert:'__str__'},
  {label:'__len__',kind:'bi',desc:'class',insert:'__len__'},
  {label:'__repr__',kind:'bi',desc:'class',insert:'__repr__'},
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const ta    = document.getElementById('code-ta');
const hlLayer = document.getElementById('hl-layer');
const gutterNums = document.getElementById('gutter-nums');
const acPopup = document.getElementById('ac-popup');
let acList = [], acSel = 0, acWord = '';
let inputResolve = null;
let engineReady = false;
let isRunning = false;
let resizing = false, resY = 0, resH = 0;

// Starter code
ta.value =
`# 🐍 PyEditor VN — Viết code Python
# Chào mừng bạn!

def chao(ten):
    print(f"Xin chào, {ten}! 👋")
    print("Hãy bắt đầu viết code Python!")

ten = input("Bạn tên gì? ")
chao(ten)
`;
tick();

// ═══════════════════════════════════════
// ENGINE LOAD
// ═══════════════════════════════════════
function checkEngine(){
  if(typeof Sk !== 'undefined' && Sk.builtinFiles){
    engineReady = true;
    document.getElementById('engine-loading').style.display = 'none';
    clearOut();
    appendOut('<span class="out-success">✓ Python engine sẵn sàng!\n</span>');
    appendOut('<span class="out-sys">// Nhấn ▶ Chạy để chạy code...\n</span>');
    setDot('ok');
  }
}
// Poll every 300ms until loaded
const enginePoll = setInterval(()=>{
  if(typeof Sk !== 'undefined'){
    clearInterval(enginePoll);
    // Give stdlib a moment
    setTimeout(checkEngine, 200);
  }
}, 300);
// Timeout after 10s
setTimeout(()=>{
  clearInterval(enginePoll);
  if(!engineReady){
    document.getElementById('engine-loading').style.display = 'none';
    clearOut();
    appendOut('<span class="out-err">❌ Không tải được Python engine.\nKiểm tra kết nối internet.\n</span>');
    setDot('err');
  }
}, 10000);

// ═══════════════════════════════════════
// CORE TICK — update everything after each keystroke
// ═══════════════════════════════════════
function tick(){
  updateHighlight();
  updateGutter();
  updateLineHighlight();
  syncSize();
}

// ── SYNTAX HIGHLIGHT ──
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const KW_RE = new RegExp(`\\b(${PY_KW.join('|')})\\b`, 'g');
const BI_RE = new RegExp(`\\b(${PY_BUILTINS.join('|')})(?=\\s*\\()`, 'g');
const BOOL_RE = /\b(True|False|None)\b/g;

function highlightLine(raw){
  // Escape first
  let s = escH(raw);

  // Comments — process and return early to avoid double-processing
  const cIdx = findCommentStart(raw);
  let cmPart = '', codePart = s;
  if(cIdx >= 0){
    codePart = escH(raw.substring(0, cIdx));
    cmPart   = '<span class="py-cm">#' + escH(raw.substring(cIdx+1)) + '</span>';
  }

  // Strings (triple first, then normal)
  codePart = codePart.replace(/("""[\s\S]*?"""|'''[\s\S]*?''')/g, '<span class="py-st">$1</span>');
  codePart = codePart.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="py-st">$1</span>');

  // Numbers
  codePart = codePart.replace(/\b(\d+\.?\d*)\b/g, '<span class="py-nm">$1</span>');

  // Decorators
  codePart = codePart.replace(/(@[\w]+)/g, '<span class="py-dec">$1</span>');

  // Class names (after 'class ')
  codePart = codePart.replace(/\b(class)\s+([A-Z]\w*)/g,
    '<span class="py-kw">class</span> <span class="py-cls">$2</span>');

  // def name
  codePart = codePart.replace(/\b(def)\s+([\w]+)/g,
    '<span class="py-kw">def</span> <span class="py-fn">$2</span>');

  // Bool/None
  codePart = codePart.replace(/\b(True|False|None)\b/g, '<span class="py-bool">$1</span>');

  // Keywords (skip already-spanned)
  codePart = codePart.replace(KW_RE, (m) =>
    codePart.includes(`>${m}<`) ? m : `<span class="py-kw">${m}</span>`
  );

  // self
  codePart = codePart.replace(/\bself\b/g, '<span class="py-self">self</span>');

  // Builtins
  codePart = codePart.replace(BI_RE, '<span class="py-fn">$1</span>');

  return codePart + cmPart;
}

function findCommentStart(line){
  let inStr = false, strChar = '';
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(inStr){ if(c===strChar && line[i-1]!=='\\') inStr=false; }
    else if(c==='"'||c==="'"){ inStr=true; strChar=c; }
    else if(c==='#') return i;
  }
  return -1;
}

function updateHighlight(){
  const lines = ta.value.split('\n');
  hlLayer.innerHTML = lines.map(highlightLine).join('\n') + '\n';
}

// ── LINE NUMBERS ──
function updateGutter(){
  const n = ta.value.split('\n').length;
  gutterNums.textContent = Array.from({length:n},(_,i)=>i+1).join('\n');
  gutterNums.style.top = (-ta.scrollTop) + 'px';
}

// ── CURRENT LINE HIGHLIGHT ──
function updateLineHighlight(){
  const pos = ta.selectionStart;
  const before = ta.value.substring(0, pos);
  const lineNum = before.split('\n').length - 1;
  const LH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--line-h'));
  document.getElementById('line-highlight').style.top = (8 + lineNum * LH) + 'px';
}

// ── SYNC INNER SIZE ──
function syncSize(){
  const lines = ta.value.split('\n').length;
  const LH = 22;
  const minH = document.getElementById('editor-scroll').clientHeight;
  const h = Math.max(lines * LH + 40, minH);
  document.getElementById('editor-inner').style.height = h + 'px';
  ta.style.height = h + 'px';
  hlLayer.style.height = h + 'px';
}

// ── SYNC SCROLL ──
document.getElementById('editor-scroll').addEventListener('scroll', function(){
  const st = this.scrollTop, sl = this.scrollLeft;
  hlLayer.style.marginTop   = -st + 'px';
  hlLayer.style.marginLeft  = -sl + 'px';
  document.getElementById('gutter-nums').style.top = -st + 'px';
  document.getElementById('line-highlight').style.marginTop = -st + 'px';
  ta.style.top  = st + 'px';
  ta.style.left = sl + 'px';
});

// ═══════════════════════════════════════
// KEYBOARD HANDLING
// ═══════════════════════════════════════
ta.addEventListener('keydown', function(e){
  // Autocomplete navigation
  if(acPopup.style.display === 'block'){
    if(e.key === 'ArrowDown'){ e.preventDefault(); acSel=Math.min(acSel+1,acList.length-1); renderAC(); return; }
    if(e.key === 'ArrowUp')  { e.preventDefault(); acSel=Math.max(acSel-1,0); renderAC(); return; }
    if(e.key === 'Tab' || e.key === 'Enter'){
      if(acList.length){ e.preventDefault(); applyAC(acList[acSel]); return; }
    }
    if(e.key === 'Escape'){ hideAC(); return; }
  }

  // Tab = 4 spaces
  if(e.key === 'Tab'){
    e.preventDefault();
    const s=ta.selectionStart, end=ta.selectionEnd;
    // Multi-line indent
    if(ta.value.substring(s,end).includes('\n')){
      const lines = ta.value.split('\n');
      // find affected lines
      const preLines = ta.value.substring(0,s).split('\n');
      const startLine = preLines.length-1;
      const preEnd = ta.value.substring(0,end).split('\n');
      const endLine = preEnd.length-1;
      const newLines = lines.map((l,i)=>
        i>=startLine && i<=endLine ? (e.shiftKey ? l.replace(/^    /,'') : '    '+l) : l
      );
      ta.value = newLines.join('\n');
    } else {
      ta.value = ta.value.substring(0,s)+'    '+ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = s+4;
    }
    tick(); return;
  }

  // Auto brackets & quotes
  const PAIRS = {'(':')', '[':']', '{':'}', '"':'"', "'":"'"};
  if(PAIRS[e.key]){
    const s=ta.selectionStart, end=ta.selectionEnd;
    const sel = ta.value.substring(s,end);
    e.preventDefault();
    if(sel){
      ta.value = ta.value.substring(0,s)+e.key+sel+PAIRS[e.key]+ta.value.substring(end);
      ta.selectionStart=s+1; ta.selectionEnd=end+1;
    } else {
      ta.value = ta.value.substring(0,s)+e.key+PAIRS[e.key]+ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = s+1;
    }
    tick(); return;
  }

  // Skip over closing bracket
  if([')',']','}'].includes(e.key)){
    const s=ta.selectionStart;
    if(ta.value[s]===e.key){ e.preventDefault(); ta.selectionStart=ta.selectionEnd=s+1; return; }
  }

  // Backspace: delete pair
  if(e.key==='Backspace' && ta.selectionStart===ta.selectionEnd){
    const s=ta.selectionStart;
    const PAIR_MAP={'(':')','[':']','{':'}','"':'"',"'":"'"};
    if(PAIR_MAP[ta.value[s-1]]===ta.value[s]){
      e.preventDefault();
      ta.value=ta.value.substring(0,s-1)+ta.value.substring(s+1);
      ta.selectionStart=ta.selectionEnd=s-1;
      tick(); return;
    }
  }

  // Enter: auto-indent + extra indent after ':'
  if(e.key==='Enter'){
    e.preventDefault();
    const s=ta.selectionStart;
    const lineStart = ta.value.lastIndexOf('\n',s-1)+1;
    const line = ta.value.substring(lineStart, s);
    const indent = line.match(/^(\s*)/)[1];
    const extra  = line.trimEnd().endsWith(':') ? '    ' : '';
    // Auto close bracket on new line
    const ins = '\n'+indent+extra;
    ta.value = ta.value.substring(0,s)+ins+ta.value.substring(ta.selectionEnd);
    ta.selectionStart=ta.selectionEnd=s+ins.length;
    tick(); return;
  }

  // Ctrl+/ toggle comment
  if((e.ctrlKey||e.metaKey) && e.key==='/'){
    e.preventDefault(); toggleComment(); return;
  }

  // Ctrl+D duplicate line
  if((e.ctrlKey||e.metaKey) && e.key==='d'){
    e.preventDefault(); duplicateLine(); return;
  }

  setTimeout(tick, 0);
});

ta.addEventListener('input', ()=>{ tick(); showAC(); });
ta.addEventListener('click', ()=>{ tick(); hideAC(); });
ta.addEventListener('keyup', updateLineHighlight);
ta.addEventListener('scroll', ()=>{
  document.getElementById('gutter-nums').style.top = -ta.scrollTop + 'px';
});

// ═══════════════════════════════════════
// AUTOCOMPLETE
// ═══════════════════════════════════════
function getWordBefore(){
  const s = ta.selectionStart;
  const m = ta.value.substring(0,s).match(/[\w\.]+$/);
  return m ? m[0] : '';
}

function showAC(){
  const word = getWordBefore();
  if(!word || word.length < 1){ hideAC(); return; }
  const q = word.toLowerCase();
  acWord = word;
  acList = AC_ITEMS.filter(i=>i.label.toLowerCase().startsWith(q) && i.label.toLowerCase()!==q).slice(0,8);
  if(!acList.length){ hideAC(); return; }
  acSel = 0;
  // Position the popup
  const rect = ta.getBoundingClientRect();
  const s = ta.selectionStart;
  const before = ta.value.substring(0,s);
  const lines = before.split('\n');
  const ln = lines.length-1;
  const col = lines[ln].length;
  const LH = 22;
  const fW = 8.0; // approx char width
  let top  = rect.top + 8 + (ln+1)*LH - ta.scrollTop;
  let left = rect.left + 12 + col*fW;
  // Clamp to viewport
  if(top+200 > window.innerHeight) top -= 200+LH;
  if(left+280 > window.innerWidth) left = window.innerWidth-290;
  acPopup.style.top  = top+'px';
  acPopup.style.left = Math.max(4,left)+'px';
  acPopup.style.display = 'block';
  renderAC();
}

function renderAC(){
  acPopup.innerHTML = acList.map((item,i)=>`
    <div class="ac-item ${i===acSel?'sel':''}" onmousedown="event.preventDefault()" onclick="applyAC(acList[${i}])">
      <span class="ac-kind ${item.kind}">${item.kind}</span>
      <span class="ac-label">${escH(item.label)}</span>
      <span class="ac-desc">${item.desc}</span>
    </div>`).join('');
}

function applyAC(item){
  const s = ta.selectionStart;
  const start = s - acWord.length;
  ta.value = ta.value.substring(0,start) + item.insert + ta.value.substring(s);
  // Put cursor inside () if needed
  const newPos = item.insert.endsWith('()') ? start+item.insert.length-1 : start+item.insert.length;
  ta.selectionStart = ta.selectionEnd = newPos;
  hideAC(); tick(); ta.focus();
}

function hideAC(){ acPopup.style.display='none'; acList=[]; }

document.addEventListener('click', e=>{
  if(!acPopup.contains(e.target)&&e.target!==ta) hideAC();
});

// ═══════════════════════════════════════
// EDITOR UTILITIES
// ═══════════════════════════════════════
function toggleComment(){
  const s=ta.selectionStart;
  const lStart = ta.value.lastIndexOf('\n',s-1)+1;
  const lEnd   = ta.value.indexOf('\n',s); const lEndReal = lEnd===-1?ta.value.length:lEnd;
  const line = ta.value.substring(lStart,lEndReal);
  let newLine, offset;
  if(line.trimStart().startsWith('# ')){ newLine=line.replace(/^(\s*)# /,'$1'); offset=-2; }
  else if(line.trimStart().startsWith('#')){ newLine=line.replace(/^(\s*)#/,'$1'); offset=-1; }
  else { const ind=line.match(/^(\s*)/)[1]; newLine=ind+'# '+line.trimStart(); offset=2; }
  ta.value = ta.value.substring(0,lStart)+newLine+ta.value.substring(lEndReal);
  ta.selectionStart=ta.selectionEnd=s+offset;
  tick();
}

function duplicateLine(){
  const s=ta.selectionStart;
  const lStart = ta.value.lastIndexOf('\n',s-1)+1;
  const lEnd   = ta.value.indexOf('\n',s); const lEndReal = lEnd===-1?ta.value.length:lEnd;
  const line   = ta.value.substring(lStart,lEndReal);
  ta.value = ta.value.substring(0,lEndReal)+'\n'+line+ta.value.substring(lEndReal);
  ta.selectionStart=ta.selectionEnd=lEndReal+1+(s-lStart);
  tick();
}

function ins(snippet){
  const s=ta.selectionStart;
  const before=ta.value.substring(0,s);
  const after =ta.value.substring(s);
  const nl = before.length>0&&!before.endsWith('\n') ? '\n' : '';
  ta.value = before+nl+snippet+after;
  ta.selectionStart=ta.selectionEnd=s+nl.length+snippet.length;
  ta.focus(); tick();
}

function clearAll(){ ta.value=''; tick(); clearOut(); ta.focus(); }
function copyCode(){ try{ navigator.clipboard.writeText(ta.value); }catch(e){} }

// ═══════════════════════════════════════
// RESIZE OUTPUT
// ═══════════════════════════════════════
function startResize(e){
  resizing=true;
  resY = e.touches ? e.touches[0].clientY : e.clientY;
  resH = document.getElementById('output-panel').offsetHeight;
  const mv = e.touches?'touchmove':'mousemove';
  const up = e.touches?'touchend':'mouseup';
  function move(ev){
    if(!resizing) return;
    const y = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const newH = Math.max(48, Math.min(resH+(resY-y), window.innerHeight*0.6));
    document.getElementById('output-panel').style.height = newH+'px';
    syncSize();
  }
  function end(){ resizing=false; document.removeEventListener(mv,move); document.removeEventListener(up,end); }
  document.addEventListener(mv,move,{passive:true});
  document.addEventListener(up,end);
}

// ═══════════════════════════════════════
// OUTPUT
// ═══════════════════════════════════════
function appendOut(html){
  const el=document.getElementById('out-content');
  el.innerHTML += html;
  el.scrollTop  = el.scrollHeight;
}
function clearOut(){
  document.getElementById('out-content').innerHTML='';
}
function setDot(state){
  const d=document.getElementById('status-dot');
  d.className = 'status-dot'+(state?' '+state:'');
}

// ═══════════════════════════════════════
// SKULPT RUNNER
// ═══════════════════════════════════════
function runCode(){
  if(isRunning) return;
  if(!engineReady){
    appendOut('<span class="out-err">❌ Python engine chưa sẵn sàng. Đợi vài giây...\n</span>');
    return;
  }
  const code = ta.value.trim();
  if(!code) return;

  isRunning = true;
  const btn = document.getElementById('btn-run');
  btn.textContent = '⏳ Đang chạy...';
  btn.classList.add('loading');

  clearOut();
  setDot('run');
  appendOut('<span class="out-line">─────────────────────────\n</span>');

  Sk.configure({
    output: text => appendOut(`<span class="out-ok">${escH(text)}</span>`),
    read: x => {
      if(!Sk.builtinFiles?.files[x]) throw new Error('Module not found: '+x);
      return Sk.builtinFiles.files[x];
    },
    inputfun: prompt => new Promise(resolve => {
      inputResolve = resolve;
      document.getElementById('modal-prompt').textContent = prompt || 'Nhập giá trị:';
      document.getElementById('modal-input').value = '';
      document.getElementById('modal-bg').classList.add('show');
      setTimeout(()=>{ try{ document.getElementById('modal-input').focus(); }catch(e){} }, 150);
    }),
    inputfunTakesPrompt: true,
    __future__: Sk.python3,
    execLimit: 30000,
    killableWhile: true,
    killableFor: true,
  });

  Sk.misceval.asyncToPromise(
    () => Sk.importMainWithBody('<stdin>', false, code, true)
  ).then(() => {
    appendOut('<span class="out-line">─────────────────────────\n</span>');
    appendOut('<span class="out-success">✓ Chạy thành công</span>');
    setDot('ok');
  }).catch(err => {
    // Format error nicely
    let msg = '';
    if(err.tp$str) msg = err.tp$str().v;
    else if(err.args?.v) msg = err.args.v.map(a=>a.v||a).join(', ');
    else msg = err.toString();
    appendOut('<span class="out-line">─────────────────────────\n</span>');
    appendOut(`<span class="out-err">❌ ${escH(msg)}</span>`);
    setDot('err');
  }).finally(() => {
    isRunning = false;
    btn.textContent = '▶ Chạy';
    btn.classList.remove('loading');
  });
}

function modalOk(){
  const val = document.getElementById('modal-input').value;
  document.getElementById('modal-bg').classList.remove('show');
  appendOut(`<span class="out-inp">${escH(val)}\n</span>`);
  if(inputResolve){ inputResolve(val); inputResolve=null; }
}
function modalCancel(){
  document.getElementById('modal-bg').classList.remove('show');
  if(inputResolve){ inputResolve(''); inputResolve=null; }
}

// Handle resize
window.addEventListener('resize', ()=>{ syncSize(); });
</script>
